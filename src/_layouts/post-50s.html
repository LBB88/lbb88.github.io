---
layout: default
---

<style>
  .post-50s .post-header {
    background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 50%, #e0f2f1 100%);
    color: #2e4a3e;
    padding: 2.5rem 2rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    text-align: center;
    border: 1px solid #80cbc4;
  }
  .post-50s .post-title {
    color: #2e4a3e;
    font-size: 2.2rem;
    margin: 0 0 0.5rem;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .post-50s .post-meta {
    color: #5d7a6d;
    font-size: 1rem;
    margin: 0;
    font-style: italic;
  }
  .post-50s .post-content {
    font-size: 1.1rem;
    line-height: 1.9;
    color: #3e5c4e;
  }
  .post-50s .post-content img {
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(46, 74, 62, 0.15);
    margin: 1.5rem 0;
    border: 1px solid #b2dfdb;
  }
  .post-50s .post-content blockquote {
    border-left: 4px solid #80cbc4;
    background: #f1f8f5;
    padding: 1rem 1.5rem;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: #2e4a3e;
  }
  .post-50s .related-posts {
    background: #f1f8f5;
    padding: 1.5rem;
    border-radius: 8px;
    margin-top: 2rem;
    border: 1px solid #b2dfdb;
  }
  .post-50s .related-posts h3 {
    color: #2e4a3e;
    margin-top: 0;
    font-weight: 400;
  }
  .post-50s .category-link {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.6rem 1.2rem;
    background: #80cbc4;
    color: #2e4a3e;
    text-decoration: none;
    border-radius: 20px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .post-50s .category-link:hover {
    background: #4db6ac;
    color: white;
  }
</style>

<article class="post post-50s h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
        {{ page.date | date: date_format }}
      </time>
      {%- if page.author -%}
        • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
      {%- endif -%}
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
