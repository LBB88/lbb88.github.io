---
layout: default
---

<style>
  .post-product .post-header {
    background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
    color: #2d3436;
    padding: 2.5rem 2rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    text-align: center;
    border: 2px solid #0984e3;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .post-product .post-title {
    color: #2d3436;
    font-size: 2.2rem;
    margin: 0 0 0.5rem;
  }
  .post-product .post-meta {
    color: #636e72;
    font-size: 1rem;
    margin: 0;
  }
  .post-product .post-content {
    font-size: 1.1rem;
    line-height: 1.8;
    color: #2d3436;
  }
  .post-product .post-content img {
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    margin: 1.5rem 0;
    border: 1px solid #dfe6e9;
  }
  .post-product .post-content blockquote {
    border-left: 4px solid #0984e3;
    background: #f0f8ff;
    padding: 1rem 1.5rem;
    border-radius: 0 8px 8px 0;
    font-style: italic;
  }
  .post-product .related-posts {
    background: #f8f9fa;
    padding: 1.5rem;
    border-radius: 8px;
    margin-top: 2rem;
    border: 1px solid #dfe6e9;
  }
  .post-product .related-posts h3 {
    color: #0984e3;
    margin-top: 0;
  }
  .post-product .category-link {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.6rem 1.2rem;
    background: #0984e3;
    color: white;
    text-decoration: none;
    border-radius: 20px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .post-product .category-link:hover {
    background: #0770c2;
  }
</style>

<article class="post post-product h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
        {{ page.date | date: date_format }}
      </time>
      {%- if page.author -%}
        • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
      {%- endif -%}
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
